version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scribe-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      #- ./pdfs:/app/pdfs
      - ./plans:/app/plans
    env_file:
      - .env
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"


  control_plane:
    build:
      context: .
      dockerfile: Dockerfile.controlplane
    container_name: scribe-control-plane
    env_file:
      - .env
    depends_on:
      - qdrant
      - ollama
      - api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"


  qdrant:
    image: qdrant/qdrant:latest
    container_name: scribe-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    build:
      context: .
      dockerfile: Dockerfile-ollama
    container_name: scribe-ollama
    volumes:
      - ollama_models:/root/.ollama

  front:
    build:
      context: .
      dockerfile: Dockerfile-front
    container_name: scribe-front
    ports:
      - "5173:5173"
      - "8080:8080"
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped


volumes:
  qdrant_storage:
  ollama_models:
