USE_OLLAMA: False
MODEL: openai/gpt-4.1-mini
TIMEOUT: 3600
TEMPERATURE: 0
MAX_RETRIES: 10
MAX_ITERATIONS: 100
VERBOSE: true
LOG_OUTPUT: true

CORE_CONFIG:
  AVALIABLE_AGENTS:
    - planner
    - executor
    - reviewer
  PLAN_OUTPUT: "plans"

GOVERNANCE_CONFIG:
  POLICIES:
    - No personal identifiable information (PII) should be present
    - Plans should be efficient (minimize redundant steps)

HOSTS:
  QDRANT: "scribe-qdrant"
  OLLAMA: "scribe-ollama"
